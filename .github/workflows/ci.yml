name: Polyglot Cloud CI (Docker Hub)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Docker Hub Login
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push to Docker Hub
      - name: Build & Push Images
        run: |
          docker build -t fatimacloud26/backend-dotnet:latest ./backend-dotnet
          docker build -t fatimacloud26/frontend-js:latest ./frontend-js
          docker build -t fatimacloud26/worker-python:latest ./worker-python
          
          docker push fatimacloud26/backend-dotnet:latest
          docker push fatimacloud26/frontend-js:latest
          docker push fatimacloud26/worker-python:latest